name: Validar biblioteca

on:
  push:
    paths:
      - columnas-jzg.json
      - schema/columnas.schema.json
      - scripts/validar-datos.mjs
      - .github/workflows/validar-json.yml
  pull_request:
    paths:
      - columnas-jzg.json
      - schema/columnas.schema.json
      - scripts/validar-datos.mjs
      - .github/workflows/validar-json.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validar columnas
        run: node scripts/validar-datos.mjs
